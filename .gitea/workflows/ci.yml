name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          pip install textual textual-serve flask flask-wtf waitress psutil markupsafe

      - name: Lint with ruff
        run: ruff check --select E,F,W lib/ tui/ web/ daemon/ --ignore E501

      - name: Run Bash tests
        run: |
          for f in tests/test_*.sh; do
            echo "=== Running $f ==="
            bash "$f"
          done

      - name: Run Python tests
        run: pytest tests/ -v

      - name: Verify deb package builds
        run: bash scripts/build-deb.sh
