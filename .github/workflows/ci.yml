name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff
          pip install textual textual-serve flask flask-wtf flask-compress waitress psutil markupsafe markdown

      - name: Lint with ruff
        run: ruff check --select E,F,W lib/ tui/ web/ daemon/ --ignore E501,E402,E741

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/test_integration.py

      - name: Run integration tests
        run: pytest tests/test_integration.py -v
