<div class="flex items-center gap-2 mb-3">
    <div class="text-sm font-mono bg-base-300 px-3 py-2 rounded break-all flex-1"
         id="browse-path-display-{{ target }}">{{ current_path }}</div>
    <button type="button" class="btn btn-sm btn-primary whitespace-nowrap"
            @click="
                let pathEl = document.getElementById('browse-path-display-{{ target }}');
                $dispatch('folder-selected', { path: pathEl.textContent.trim(), target: '{{ target }}' })
            ">
        Select
    </button>
</div>

{% if current_path != '/' %}
<div class="mb-2">
    <a class="btn btn-ghost btn-xs font-mono gap-1 cursor-pointer"
       hx-get="{{ url_for('api.browse', path=current_path.rsplit('/', 1)[0] or '/', target=target) }}"
       hx-target="closest .folder-browser-box"
       hx-swap="innerHTML">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        ..
    </a>
</div>
{% endif %}

<ul class="menu menu-xs bg-base-100 rounded-lg w-full max-h-72 overflow-y-auto">
    {% for d in dirs %}
    {% set child_path = current_path.rstrip('/') + '/' + d %}
    <li>
        <details hx-get="{{ url_for('api.browse_children', path=child_path, target=target) }}"
                 hx-target="find ul"
                 hx-swap="innerHTML"
                 hx-trigger="toggle once"
                 @toggle="if($el.open) document.getElementById('browse-path-display-{{ target }}').textContent = '{{ child_path }}'">
            <summary class="font-mono">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" /></svg>
                {{ d }}
            </summary>
            <ul>
                <li><span class="text-base-content/40 text-xs"><span class="loading loading-dots loading-xs"></span></span></li>
            </ul>
        </details>
    </li>
    {% else %}
    <li class="disabled"><span class="text-base-content/40 italic text-xs px-2 py-1">Empty directory</span></li>
    {% endfor %}
</ul>
