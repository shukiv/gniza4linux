{% if job.status == "running" %}
<div hx-get="{{ url_for('jobs.progress', job_id=job.id) }}"
     hx-trigger="every 2s"
     hx-swap="innerHTML"
     class="mb-2">
</div>
{% endif %}
<div class="bg-base-300 rounded-lg p-3 max-h-80 overflow-y-auto font-mono text-xs"
     {% if job.status == "running" %}
     hx-get="{{ url_for('jobs.log', job_id=job.id) }}"
     hx-trigger="every 2s"
     hx-swap="innerHTML"
     {% else %}
     hx-get="{{ url_for('jobs.log', job_id=job.id) }}"
     hx-trigger="load"
     hx-swap="innerHTML"
     {% endif %}
     hx-on::after-swap="this.scrollTop = this.scrollHeight"
>
    <span class="text-base-content/40">Loading log...</span>
</div>
