<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GNIZA - Login</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-base-100 flex items-center justify-center">
<div class="card bg-base-200 w-full max-w-sm">
    <div class="card-body">
        <div class="flex items-center justify-center gap-3 mb-6">
            <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center font-bold text-xl text-primary-content">G</div>
            <span class="text-2xl font-bold tracking-wide">GNIZA</span>
        </div>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div role="alert" class="alert alert-error text-sm mb-3">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <label class="label" for="token">API Key</label>
            <input type="password" name="token" id="token" placeholder="Enter your API key" autofocus class="input input-bordered w-full mb-4" />
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>
        <p class="text-center text-base-content/50 text-sm mt-6">GNIZA Backup Manager</p>
    </div>
</div>
</body>
</html>
