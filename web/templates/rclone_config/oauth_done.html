{% extends "base.html" %}

{% block title %}GNIZA - Authentication Complete{% endblock %}
{% block page_title %}Authentication Complete{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[40vh]">
    <div class="card bg-base-200 shadow max-w-md">
        <div class="card-body text-center">
            <div class="text-success text-5xl mb-4">
                <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            </div>
            <h2 class="text-lg font-semibold mb-2">Authentication successful!</h2>
            <p class="text-base-content/60 text-sm mb-4">This window will close automatically...</p>
            <a href="{{ url_for('rclone_config.index') }}" class="btn btn-primary btn-sm">Go to Rclone Remotes</a>
        </div>
    </div>
</div>
<script nonce="{{ csp_nonce }}">
    // Auto-close this popup/tab after a short delay
    setTimeout(function() {
        window.close();
    }, 1500);
</script>
{% endblock %}
