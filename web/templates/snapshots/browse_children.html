{% for d in dirs %}
{% set child_path = (parent_path + '/' + d).strip('/') %}
<li>
    <details hx-get="{{ url_for('snapshots.browse_children', target=target, remote=remote, snapshot=snapshot, path=child_path) }}"
             hx-target="find ul"
             hx-swap="innerHTML"
             hx-trigger="toggle once">
        <summary class="font-mono">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" /></svg>
            {{ d }}
            <a href="{{ url_for('snapshots.download', target=target, remote=remote, snapshot=snapshot, path=child_path, type='folder') }}"
               class="btn btn-ghost btn-xs" title="Download as tar.gz"
               onclick="event.stopPropagation()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
            </a>
        </summary>
        <ul>
            <li><span class="text-base-content/40 text-xs"><span class="loading loading-dots loading-xs"></span></span></li>
        </ul>
    </details>
</li>
{% endfor %}
{% for f in files %}
{% set file_path = (parent_path + '/' + f).strip('/') %}
<li>
    <span class="font-mono">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
        {{ f }}
        <a href="{{ url_for('snapshots.download', target=target, remote=remote, snapshot=snapshot, path=file_path, type='file') }}"
           class="btn btn-ghost btn-xs" title="Download">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        </a>
    </span>
</li>
{% endfor %}
{% if not dirs and not files %}
<li><span class="text-base-content/40 italic text-xs px-2 py-1">Empty</span></li>
{% endif %}
