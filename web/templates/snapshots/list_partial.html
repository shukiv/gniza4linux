{% if error %}
<div class="alert alert-error">
    <span>{{ error }}</span>
</div>
{% elif snapshots %}
<div class="space-y-1">
    {% for s in snapshots %}
    <button class="btn btn-ghost btn-sm btn-block justify-start font-mono"
            hx-get="/snapshots/browse/{{ target }}/{{ remote }}/{{ s }}"
            hx-target="#snapshot-browser"
            hx-swap="innerHTML">
        {{ s }}
    </button>
    {% endfor %}
</div>
{% else %}
<p class="text-base-content/40">No snapshots found for this combination.</p>
{% endif %}
